<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#211c12"/>
      <stop offset="60%" stop-color="#16130d"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#16130d"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Accent bars -->
  <rect x="0" y="0" width="1200" height="6" fill="#d9a441"/>
  <rect x="0" y="0" width="8" height="630" fill="#d9a441"/>

  <!-- "typo" wordmark + caret -->
  <text x="96" y="280" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="168" font-weight="800"
    fill="#d9a441" letter-spacing="-6">typo</text>
  <rect x="612" y="158" width="10" height="132" fill="#d9a441"/>

  <!-- Divider -->
  <rect x="98" y="320" width="560" height="2" fill="rgba(236,228,210,0.16)"/>

  <!-- Subtitles -->
  <text x="98" y="378" font-family="'Inter', system-ui, sans-serif" font-size="38" font-weight="600"
    fill="#ece4d2">Test de vitesse de frappe</text>
  <text x="98" y="420" font-family="'Inter', system-ui, sans-serif" font-size="26"
    fill="#8c8169">Typing speed test · mots par minute</text>

  <!-- Feature badges -->
  <rect x="98" y="470" width="138" height="48" rx="9" fill="rgba(217,164,65,0.12)" stroke="rgba(217,164,65,0.5)"/>
  <text x="167" y="500" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600"
    fill="#d9a441" text-anchor="middle">FR &amp; EN</text>

  <rect x="250" y="470" width="186" height="48" rx="9" fill="rgba(217,164,65,0.12)" stroke="rgba(217,164,65,0.5)"/>
  <text x="343" y="500" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600"
    fill="#d9a441" text-anchor="middle">Défi quotidien</text>

  <rect x="450" y="470" width="150" height="48" rx="9" fill="rgba(217,164,65,0.12)" stroke="rgba(217,164,65,0.5)"/>
  <text x="525" y="500" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600"
    fill="#d9a441" text-anchor="middle">Mode code</text>

  <!-- Right: typing sample line -->
  <text x="1102" y="250" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="26" text-anchor="end">
    <tspan fill="#ece4d2">the quick brown</tspan><tspan fill="#57513f"> fox</tspan>
  </text>
  <text x="1102" y="300" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="120" font-weight="800"
    fill="rgba(217,164,65,0.14)" text-anchor="end">216</text>
  <text x="1102" y="350" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700"
    fill="#8c8169" text-anchor="end">RECORD DU MONDE · WPM</text>

  <!-- Brand -->
  <text x="98" y="588" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" font-weight="500"
    fill="#5d5747">my-monkey.fr</text>
</svg>
