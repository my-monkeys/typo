<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background white -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f3f4f6" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Top + left accent bars -->
  <rect x="0" y="0" width="1200" height="6" fill="#4f46e5"/>
  <rect x="0" y="0" width="8" height="630" fill="#4f46e5"/>
  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#4f46e5"/>

  <!-- "typo" big title -->
  <text x="100" y="265" font-family="'Courier New', Courier, monospace" font-size="160" font-weight="900"
    fill="#4f46e5" letter-spacing="-8">typo</text>

  <!-- Divider -->
  <rect x="100" y="295" width="560" height="3" fill="#e5e7eb"/>

  <!-- FR subtitle -->
  <text x="100" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500"
    fill="#111827">Test de vitesse de frappe</text>
  <!-- EN subtitle -->
  <text x="100" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="26"
    fill="#9ca3af">Typing speed test · WPM</text>

  <!-- Feature badges -->
  <rect x="100" y="450" width="140" height="46" rx="8" fill="#eef2ff"/>
  <text x="170" y="479" font-family="system-ui, sans-serif" font-size="14" font-weight="600"
    fill="#4f46e5" text-anchor="middle">FR &amp; EN</text>

  <rect x="252" y="450" width="190" height="46" rx="8" fill="#eef2ff"/>
  <text x="347" y="479" font-family="system-ui, sans-serif" font-size="14" font-weight="600"
    fill="#4f46e5" text-anchor="middle">Défi quotidien</text>

  <rect x="454" y="450" width="150" height="46" rx="8" fill="#eef2ff"/>
  <text x="529" y="479" font-family="system-ui, sans-serif" font-size="14" font-weight="600"
    fill="#4f46e5" text-anchor="middle">Mode code</text>

  <!-- Right side WPM stat -->
  <text x="1050" y="255" font-family="'Courier New', Courier, monospace" font-size="130" font-weight="900"
    fill="#ede9fe" text-anchor="middle">60</text>
  <text x="1050" y="318" font-family="system-ui, sans-serif" font-size="22" font-weight="700"
    fill="#6366f1" text-anchor="middle">WPM MOYEN</text>

  <!-- Brand -->
  <text x="100" y="586" font-family="system-ui, sans-serif" font-size="18" font-weight="600"
    fill="#9ca3af">my-monkey.fr</text>
</svg>
